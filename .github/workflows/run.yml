name: Morning Briefing

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic feedparser requests

      - name: Run briefing
        run: python morning_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: jessenlj40@gmail.com
          GITHUB_USERNAME: jessenlj
          REPO_NAME: morning_briefing

      - name: Commit database and website
        run: |
          git config user.name "morning-briefing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/briefings.json docs/index.html
          git diff --staged --quiet || git commit -m "briefing: ${{ env.TODAY }}"
          git push
        env:
          TODAY: $(date +%Y-%m-%d)
